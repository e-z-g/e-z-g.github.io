<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input-Optimized Passwords</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM via Cloudflare -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel to compile JSX in the browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    body { background-color: #000; color: #fff; margin: 0; font-family: sans-serif; }
  </style>

  <!-- Global Error Catcher -->
  <script>
    window.addEventListener('error', function(event) {
      document.getElementById('root').innerHTML = 
        '<div style="color: #ef4444; background: #220202; padding: 20px; margin: 20px; border-radius: 8px; border: 1px solid #ef4444;">' +
        '<h3 style="margin-top:0;">Compilation Error</h3>' +
        '<code>' + event.message + '</code>' +
        '</div>';
    });
  </script>
</head>
<body>
  <div id="root">
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: #888;">
      Loading App Generator... (If this text doesn't disappear, check your internet connection to the CDNs)
    </div>
  </div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useCallback, useMemo } = React;

    // Custom Icon Wrapper to avoid external icon library dependencies
    const IconWrapper = ({ children, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Settings2 = (p) => <IconWrapper {...p}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></IconWrapper>;
    const RefreshCw = (p) => <IconWrapper {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const Copy = (p) => <IconWrapper {...p}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></IconWrapper>;
    const Tv = (p) => <IconWrapper {...p}><rect width="20" height="15" x="2" y="7" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></IconWrapper>;
    const CheckCircle2 = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
    const Gamepad2 = (p) => <IconWrapper {...p}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></IconWrapper>;
    const Info = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconWrapper>;
    const Keyboard = (p) => <IconWrapper {...p}><rect width="20" height="16" x="2" y="4" rx="2" ry="2"/><path d="M6 8h.01"/><path d="M10 8h.01"/><path d="M14 8h.01"/><path d="M18 8h.01"/><path d="M8 12h.01"/><path d="M12 12h.01"/><path d="M16 12h.01"/><path d="M7 16h10"/></IconWrapper>;
    const GitMerge = (p) => <IconWrapper {...p}><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></IconWrapper>;
    const MoveLeft = (p) => <IconWrapper {...p}><path d="M6 8L2 12L6 16"/><path d="M2 12H22"/></IconWrapper>;
    const MoveRight = (p) => <IconWrapper {...p}><path d="M18 8L22 12L18 16"/><path d="M2 12H22"/></IconWrapper>;
    const ArrowLeftRight = (p) => <IconWrapper {...p}><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></IconWrapper>;
    const EyeOff = (p) => <IconWrapper {...p}><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></IconWrapper>;
    const Dna = (p) => <IconWrapper {...p}><path d="M2 15c6.667-6 13.333 0 20-6"/><path d="M9 22c1.798-1.998 2.518-3.995 2.807-5.993"/><path d="M15 2c-1.798 1.998-2.518 3.995-2.807 5.993"/><path d="m17 6-2.5-2.5"/><path d="m14 8-1-1"/><path d="m7 18 2.5 2.5"/><path d="m3.5 14.5.5.5"/><path d="m20 9 .5.5"/><path d="m6.5 12.5 1 1"/><path d="m16.5 10.5 1 1"/><path d="m10 16 1.5 1.5"/></IconWrapper>;
    const Crosshair = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></IconWrapper>;
    const Palette = (p) => <IconWrapper {...p}><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></IconWrapper>;

    const LAYOUTS = {
      qwerty: {
        unshifted: [
          ['1','2','3','4','5','6','7','8','9','0'],
          ['q','w','e','r','t','y','u','i','o','p'],
          ['a','s','d','f','g','h','j','k','l',''], 
          ['z','x','c','v','b','n','m',',','.','/']
        ],
        shifted: [
          ['!','@','#','$','%','^','&','*','(',')'],
          ['Q','W','E','R','T','Y','U','I','O','P'],
          ['A','S','D','F','G','H','J','K','L',''],
          ['Z','X','C','V','B','N','M','\x3C','\x3E','?']
        ]
      },
      colemak: {
        unshifted: [
          ['1','2','3','4','5','6','7','8','9','0'],
          ['q','w','f','p','g','j','l','u','y',';'],
          ['a','r','s','t','d','h','n','e','i','o'],
          ['z','x','c','v','b','k','m',',','.','/']
        ],
        shifted: [
          ['!','@','#','$','%','^','&','*','(',')'],
          ['Q','W','F','P','G','J','L','U','Y',':'],
          ['A','R','S','T','D','H','N','E','I','O'],
          ['Z','X','C','V','B','K','M','\x3C','\x3E','?']
        ]
      },
      dvorak: {
        unshifted: [
          ['1','2','3','4','5','6','7','8','9','0'],
          ['\'',',','.','p','y','f','g','c','r','l'],
          ['a','o','e','u','i','d','h','t','n','s'],
          [';', 'q','j','k','x','b','m','w','v','z']
        ],
        shifted: [
          ['!','@','#','$','%','^','&','*','(',')'],
          ['"','\x3C','\x3E','P','Y','F','G','C','R','L'],
          ['A','O','E','U','I','D','H','T','N','S'],
          [':', 'Q','J','K','X','B','M','W','V','Z']
        ]
      }
    };

    const FINGER_ASSIGNMENTS = [
      { hand: 'L', finger: 'pinky', strength: 3 },
      { hand: 'L', finger: 'ring', strength: 2 },
      { hand: 'L', finger: 'middle', strength: 1 },
      { hand: 'L', finger: 'index', strength: 1 },
      { hand: 'L', finger: 'index', strength: 1.5 },
      { hand: 'R', finger: 'index', strength: 1.5 },
      { hand: 'R', finger: 'index', strength: 1 },
      { hand: 'R', finger: 'middle', strength: 1 },
      { hand: 'R', finger: 'ring', strength: 2 },
      { hand: 'R', finger: 'pinky', strength: 3 }
    ];
    const ROW_DISTANCES = [2, 1, 0, 1];

    const buildKeyboardMap = (layoutId) => {
      const map = {};
      LAYOUTS[layoutId].unshifted.forEach((row, y) => row.forEach((char, x) => {
        if (char) map[char] = { x, y, plane: 'base', ...FINGER_ASSIGNMENTS[x], rowDist: ROW_DISTANCES[y] };
      }));
      LAYOUTS[layoutId].shifted.forEach((row, y) => row.forEach((char, x) => {
        if (char) map[char] = { x, y, plane: 'shift', ...FINGER_ASSIGNMENTS[x], rowDist: ROW_DISTANCES[y] };
      }));
      return map;
    };

    const SHIFT_KEY_POS = { x: 0, y: 3 };

    const getTvDistance = (p1, p2) => {
      const manhattan = (posA, posB) => Math.abs(posA.x - posB.x) + Math.abs(posA.y - posB.y);
      if (p1.plane === p2.plane) {
        return manhattan(p1, p2);
      } else {
        return manhattan(p1, SHIFT_KEY_POS) + 1 + manhattan(SHIFT_KEY_POS, p2);
      }
    };

    const getKeyboardDistance = (p1, p2, shiftPref) => {
      let effort = 0;
      effort += p2.strength; 
      effort += p2.rowDist * 1.5; 

      if (p1.hand !== p2.hand) {
        effort += 0; 
      } else {
        effort += 10; 
        if (p1.finger !== p2.finger) {
          effort += 2; 
          const isAdjacent = Math.abs(p1.x - p2.x) <= 1 && Math.abs(p1.y - p2.y) <= 1;
          if (isAdjacent && p1.y !== p2.y) {
            effort += 5; 
          }
        } else {
          if (p1.x === p2.x && p1.y === p2.y) {
            effort += 8;
          } else {
            effort += 6;
          }
        }
      }

      if (p1.plane !== p2.plane) {
        effort += 2;
      }

      if (p2.plane === 'shift') {
        let shiftHand = null;
        if (shiftPref === 'left') {
          shiftHand = 'L';
          if (p2.hand === 'L') effort += 25; 
        } else if (shiftPref === 'right') {
          shiftHand = 'R';
          if (p2.hand === 'R') effort += 25; 
        } else {
          shiftHand = p2.hand === 'L' ? 'R' : 'L'; 
        }

        if (p1.plane === 'base' && p1.hand === shiftHand && p1.finger !== 'index') {
          effort += 20; 
        }
      }

      return effort;
    };

    const getDistance = (char1, char2, mode, shiftPref, keyboardMap) => {
      const p1 = keyboardMap[char1];
      const p2 = keyboardMap[char2];
      if (!p1 || !p2) return 0; 

      const tvDist = getTvDistance(p1, p2);
      const kbDist = getKeyboardDistance(p1, p2, shiftPref);

      if (mode === 'tv') return tvDist;
      if (mode === 'keyboard') return kbDist;
      return (tvDist + kbDist) / 2;
    };

    const calculateTotalMoves = (password, mode, shiftPref, tvCursor, keyboardMap) => {
      let moves = 0;
      if ((mode === 'tv' || mode === 'hybrid') && tvCursor !== 'none' && password.length > 0) {
        moves += getDistance(tvCursor, password[0], mode, shiftPref, keyboardMap);
        if (mode === 'tv') moves += 1;
      }
      for (let i = 0; i < password.length - 1; i++) {
        moves += getDistance(password[i], password[i + 1], mode, shiftPref, keyboardMap);
        if (mode === 'tv') moves += 1; 
      }
      if (mode === 'tv') moves += 1; 
      return moves;
    };

    function App() {
      const [password, setPassword] = useState('');
      const [length, setLength] = useState(8);
      const [opts, setOpts] = useState({ lower: true, upper: true, numbers: true, symbols: true, unambiguous: true });
      const [mode, setMode] = useState('keyboard'); 
      const [shiftPref, setShiftPref] = useState('left'); 
      const [layout, setLayout] = useState('qwerty');
      const [colorCode, setColorCode] = useState(false);
      const [entropy, setEntropy] = useState(2); 
      const [tvCursor, setTvCursor] = useState('g'); 
      const [customTvCursor, setCustomTvCursor] = useState('a');
      const [copied, setCopied] = useState(false);
      const [stats, setStats] = useState({ optimized: 0, standard: 0, saved: 0, equivalentLength: 0 });

      const keyboardMap = useMemo(() => buildKeyboardMap(layout), [layout]);

      const handleToggle = (key) => {
        setOpts(prev => {
          const next = { ...prev, [key]: !prev[key] };
          if (!next.lower && !next.upper && !next.numbers && !next.symbols) return prev;
          return next;
        });
      };

      const generatePassword = useCallback(() => {
        try {
            const layoutData = LAYOUTS[layout];
            let rawCharset = [];
            if (opts.lower) rawCharset = rawCharset.concat(layoutData.unshifted.flat().filter(c => /[a-z]/.test(c)));
            if (opts.upper) rawCharset = rawCharset.concat(layoutData.shifted.flat().filter(c => /[A-Z]/.test(c)));
            if (opts.numbers) rawCharset = rawCharset.concat(layoutData.unshifted[0]);
            if (opts.symbols) rawCharset = rawCharset.concat(layoutData.shifted[0].concat(['\x3C','\x3E','?']));

            let charset = [...rawCharset];

            if (opts.unambiguous) {
              charset = charset.filter(c => !['l', '1', 'I', 'O', '0'].includes(c));
            }

            charset = charset.filter(c => keyboardMap[c] && keyboardMap[c].x !== 4 && keyboardMap[c].x !== 5);

            if (mode !== 'tv') {
              if (shiftPref === 'left') {
                charset = charset.filter(c => !(keyboardMap[c].plane === 'shift' && keyboardMap[c].hand === 'L'));
              } else if (shiftPref === 'right') {
                charset = charset.filter(c => !(keyboardMap[c].plane === 'shift' && keyboardMap[c].hand === 'R'));
              }
            }

            if (charset.length === 0) return;

            let bestPwd = "";
            let bestPathSpace = 1;
            
            const activeTvCursor = tvCursor === 'other' ? (customTvCursor || 'a').toLowerCase() : tvCursor;
            
            const getMissingTypes = (str) => {
              let missing = [];
              if (opts.lower && !/[a-z]/.test(str)) missing.push('lower');
              if (opts.upper && !/[A-Z]/.test(str)) missing.push('upper');
              if (opts.numbers && !/[0-9]/.test(str)) missing.push('numbers');
              if (opts.symbols && !/[^a-zA-Z0-9]/.test(str)) missing.push('symbols');
              return missing;
            };
            
            const requiredTypes = [];
            if (opts.lower) requiredTypes.push('lower');
            if (opts.upper) requiredTypes.push('upper');
            if (opts.numbers) requiredTypes.push('numbers');
            if (opts.symbols) requiredTypes.push('symbols');
            
            for (let attempt = 0; attempt < 100; attempt++) {
              let pwd = "";
              let attemptPathSpace = 1;
              let lastChar = ((mode === 'tv' || mode === 'hybrid') && tvCursor !== 'none') ? activeTvCursor : null;

              let forcedIndices = {};
              let availableIndices = Array.from({length}, (_, idx) => idx);
              for (let k = availableIndices.length - 1; k > 0; k--) {
                  const j = Math.floor(Math.random() * (k + 1));
                  [availableIndices[k], availableIndices[j]] = [availableIndices[j], availableIndices[k]];
              }
              for (let k = 0; k < requiredTypes.length; k++) {
                  if (k < length) forcedIndices[availableIndices[k]] = requiredTypes[k];
              }

              for (let i = 0; i < length; i++) {
                let currentPool = charset;
                
                if (forcedIndices[i]) {
                  const req = forcedIndices[i];
                  currentPool = charset.filter(c => {
                    if (req === 'lower' && /[a-z]/.test(c)) return true;
                    if (req === 'upper' && /[A-Z]/.test(c)) return true;
                    if (req === 'numbers' && /[0-9]/.test(c)) return true;
                    if (req === 'symbols' && /[^a-zA-Z0-9]/.test(c)) return true;
                    return false;
                  });
                  if (currentPool.length === 0) currentPool = charset; 
                }

                let pool = [];
                if (i === 0 && !lastChar) {
                  pool = currentPool; 
                } else {
                  let min_d = Infinity;
                  const distances = currentPool.map(c => {
                    const d = getDistance(lastChar, c, mode, shiftPref, keyboardMap);
                    if (d < min_d) min_d = d;
                    return { char: c, dist: d };
                  });
                  pool = distances.filter(x => x.dist <= min_d + entropy).map(x => x.char);
                }

                let current = pool[Math.floor(Math.random() * pool.length)];
                pwd += current;
                lastChar = current;
                attemptPathSpace *= pool.length;
              }

              if (getMissingTypes(pwd).length === 0) {
                bestPwd = pwd;
                bestPathSpace = attemptPathSpace;
                break; 
              }
              
              if (attempt === 99) {
                bestPwd = pwd;
                bestPathSpace = attemptPathSpace;
              }
            }

            setPassword(bestPwd);
            setCopied(false);

            let totalDist = 0;
            let pairCount = 0;
            if (rawCharset.length > 0) {
              for (let a of rawCharset) {
                for (let b of rawCharset) {
                  totalDist += getDistance(a, b, mode, shiftPref, keyboardMap);
                  pairCount++;
                }
              }
            }
            const avgPairDist = pairCount > 0 ? totalDist / pairCount : 0;
            
            let firstJumpAvg = 0;
            if ((mode === 'tv' || mode === 'hybrid') && tvCursor !== 'none' && rawCharset.length > 0) {
              let totalStartDist = 0;
              for(let c of rawCharset) {
                  totalStartDist += getDistance(activeTvCursor, c, mode, shiftPref, keyboardMap);
              }
              firstJumpAvg = totalStartDist / rawCharset.length;
              if (mode === 'tv') firstJumpAvg += 1;
            }

            let standardAvg = avgPairDist * (length - 1) + firstJumpAvg;
            if (mode === 'tv') standardAvg += length; 

            const optimizedCost = calculateTotalMoves(bestPwd, mode, shiftPref, activeTvCursor, keyboardMap);
            const eqLength = Math.max(1, (Math.log(bestPathSpace) / Math.log(rawCharset.length || 1)));
            
            setStats({
                optimized: optimizedCost,
                standard: standardAvg,
                saved: Math.max(0, Math.round(((standardAvg - optimizedCost) / (standardAvg || 1)) * 100)),
                equivalentLength: eqLength.toFixed(1)
            });
        } catch(e) {
            console.error("Generator Error:", e);
        }
      }, [length, opts, mode, shiftPref, entropy, tvCursor, customTvCursor, layout, keyboardMap]);

      useEffect(() => {
        generatePassword();
      }, [generatePassword]);

      const copyToClipboard = () => {
        const textArea = document.createElement("textarea");
        textArea.value = password;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {}
        document.body.removeChild(textArea);
      };

      return (
        <div className="min-h-screen bg-black text-neutral-200 font-sans p-4 md:p-8 flex items-center justify-center">
          <div className="max-w-2xl w-full">
            <div className="text-center mb-10">
              <div className="inline-flex items-center justify-center p-3 bg-neutral-900 rounded-full mb-4 border border-neutral-800">
                {mode === 'tv' ? <Tv className="w-8 h-8 text-white" /> : 
                 mode === 'keyboard' ? <Keyboard className="w-8 h-8 text-white" /> : 
                 <GitMerge className="w-8 h-8 text-white" />}
              </div>
              <h1 className="text-3xl md:text-4xl font-bold text-white mb-3">Input-Optimized Passwords</h1>
              <p className="text-neutral-400 text-sm md:text-base max-w-lg mx-auto leading-relaxed">
                Generates strong passwords engineered to minimize thumb effort on D-pads, or awkward finger reaches on physical keyboards.
              </p>
            </div>

            <div className="bg-neutral-950 border border-neutral-800 rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden">
              
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-neutral-800 via-neutral-400 to-neutral-800" />
              <div className="absolute -top-24 -right-24 w-48 h-48 bg-white/5 rounded-full blur-3xl" />

              <div className="relative group mb-10">
                <div className="bg-black border-2 border-neutral-800 rounded-2xl p-6 md:p-8 text-center break-all transition-all group-hover:border-neutral-600">
                  <span className="font-mono text-3xl md:text-5xl tracking-widest font-bold text-white selection:bg-white/20">
                    {colorCode ? password.split('').map((char, i) => {
                      let colorClass = 'text-white';
                      if (/[a-z]/.test(char)) colorClass = 'text-neutral-400';
                      else if (/[A-Z]/.test(char)) colorClass = 'text-blue-400';
                      else if (/[0-9]/.test(char)) colorClass = 'text-emerald-400';
                      else colorClass = 'text-purple-400';
                      return <span key={i} className={colorClass}>{char}</span>;
                    }) : password}
                  </span>
                </div>
                
                <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 flex gap-3">
                  <button 
                    onClick={copyToClipboard}
                    className={`flex items-center gap-2 px-5 py-2.5 rounded-full font-medium shadow-lg transition-all transform active:scale-95 ${
                      copied 
                        ? 'bg-neutral-300 text-black shadow-neutral-500/25' 
                        : 'bg-white hover:bg-neutral-200 text-black shadow-white/10'
                    }`}
                  >
                    {copied ? <CheckCircle2 className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                    {copied ? 'Copied!' : 'Copy'}
                  </button>
                  <button 
                    onClick={() => setColorCode(!colorCode)}
                    className={`flex items-center justify-center p-2.5 rounded-full transition-all active:scale-95 border ${colorCode ? 'bg-purple-500/20 text-purple-400 border-purple-500/30' : 'bg-neutral-900 hover:bg-neutral-800 text-neutral-400 border-neutral-700'}`}
                    title="Toggle Color Coding"
                  >
                    <Palette className="w-5 h-5" />
                  </button>
                  <button 
                    onClick={generatePassword}
                    className="flex items-center justify-center p-2.5 rounded-full bg-neutral-900 hover:bg-neutral-800 text-white transition-all active:scale-95 border border-neutral-700"
                    title="Generate New Password"
                  >
                    <RefreshCw className="w-5 h-5" />
                  </button>
                </div>
              </div>

              <div className="space-y-8 mb-10 mt-6">
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2 text-neutral-300 font-medium">
                    <Settings2 className="w-5 h-5 text-white" />
                    Password Length
                  </div>
                  <span className="text-2xl font-bold text-white w-8 text-right">{length}</span>
                </div>
                
                <input 
                  type="range" 
                  min="6" max="32" 
                  value={length}
                  onChange={(e) => setLength(parseInt(e.target.value))}
                  className="w-full h-2 bg-neutral-800 rounded-lg appearance-none cursor-pointer accent-white"
                />

                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { id: 'lower', label: 'a-z', desc: 'Lowercase' },
                    { id: 'upper', label: 'A-Z', desc: 'Uppercase' },
                    { id: 'numbers', label: '0-9', desc: 'Numbers' },
                    { id: 'symbols', label: '#$&', desc: 'Symbols' }
                  ].map(opt => (
                    <button
                      key={opt.id}
                      onClick={() => handleToggle(opt.id)}
                      className={`p-4 rounded-xl border transition-all text-left flex flex-col gap-1 relative overflow-hidden ${
                        opts[opt.id] 
                          ? 'bg-neutral-800/80 border-neutral-500 text-white' 
                          : 'bg-neutral-900/50 border-neutral-800 text-neutral-500 hover:bg-neutral-800'
                      }`}
                    >
                      <span className={`text-xl font-bold ${opts[opt.id] ? 'text-white' : 'text-neutral-600'}`}>
                        {opt.label}
                      </span>
                      <span className="text-xs font-medium uppercase tracking-wider">{opt.desc}</span>
                      {opts[opt.id] && <div className="absolute top-0 right-0 w-2 h-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.5)]" />}
                    </button>
                  ))}
                </div>
              </div>

              <hr className="my-8 border-neutral-800" />

              <div className="mb-10">
                <div className="flex items-center gap-2 text-neutral-300 font-medium mb-4">
                  <GitMerge className="w-5 h-5 text-white" />
                  Optimization Target
                </div>
                <div className="grid grid-cols-3 gap-3">
                  {[
                    { id: 'tv', label: 'TV D-Pad', icon: Tv },
                    { id: 'hybrid', label: 'Hybrid', icon: GitMerge },
                    { id: 'keyboard', label: 'Keyboard', icon: Keyboard }
                  ].map(m => {
                    const Icon = m.icon;
                    const isActive = mode === m.id;
                    return (
                      <button
                        key={m.id}
                        onClick={() => setMode(m.id)}
                        className={`p-3 rounded-xl border flex flex-col items-center justify-center gap-2 transition-all active:scale-95 ${
                          isActive
                            ? 'bg-neutral-800 border-neutral-500 text-white shadow-[0_0_15px_rgba(255,255,255,0.05)]'
                            : 'bg-neutral-900 border-neutral-800 text-neutral-500 hover:bg-neutral-800 hover:text-neutral-300'
                        }`}
                      >
                        <Icon className={`w-6 h-6 ${isActive ? 'text-white' : 'text-neutral-500'}`} />
                        <span className="text-sm font-semibold">{m.label}</span>
                      </button>
                    )
                  })}
                </div>
              </div>

              {mode !== 'tv' && (
                <div className="mb-10">
                  <div className="flex items-center gap-2 text-neutral-300 font-medium mb-4">
                    <ArrowLeftRight className="w-5 h-5 text-white" />
                    Shift Key Habit
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    {[
                      { id: 'left', label: 'Left Shift', icon: MoveLeft },
                      { id: 'optimal', label: 'Optimized', icon: ArrowLeftRight },
                      { id: 'right', label: 'Right Shift', icon: MoveRight }
                    ].map(s => {
                      const Icon = s.icon;
                      const isActive = shiftPref === s.id;
                      return (
                        <button
                          key={s.id}
                          onClick={() => setShiftPref(s.id)}
                          className={`p-3 rounded-xl border flex flex-col items-center justify-center gap-2 transition-all active:scale-95 ${
                            isActive
                              ? 'bg-neutral-800 border-neutral-500 text-white shadow-[0_0_15px_rgba(255,255,255,0.05)]'
                              : 'bg-neutral-900 border-neutral-800 text-neutral-500 hover:bg-neutral-800 hover:text-neutral-300'
                          }`}
                        >
                          <Icon className={`w-5 h-5 ${isActive ? 'text-white' : 'text-neutral-500'}`} />
                          <span className="text-sm font-semibold">{s.label}</span>
                        </button>
                      )
                    })}
                  </div>
                </div>
              )}

              <div className="mb-10 p-5 bg-neutral-900/40 rounded-2xl border border-neutral-800 space-y-6">
                
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-neutral-800 rounded-lg">
                      <EyeOff className="w-4 h-4 text-white" />
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-white">Avoid Ambiguous Characters</div>
                      <div className="text-xs text-neutral-500">Excludes 1, l, I, O, 0</div>
                    </div>
                  </div>
                  <button
                    onClick={() => setOpts(p => ({...p, unambiguous: !p.unambiguous}))}
                    className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${opts.unambiguous ? 'bg-white' : 'bg-neutral-700'}`}
                  >
                    <span className={`inline-block h-4 w-4 transform rounded-full bg-black transition-transform ${opts.unambiguous ? 'translate-x-6' : 'translate-x-1'}`} />
                  </button>
                </div>

                <div>
                  <div className="flex items-center gap-3 mb-3">
                    <div className="p-2 bg-neutral-800 rounded-lg">
                      <Dna className="w-4 h-4 text-white" />
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-white">Path Randomness (Entropy)</div>
                      <div className="text-xs text-neutral-500">Higher randomness increases security but reduces fluidity.</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2">
                    {[
                      { id: 0, label: 'Strict' },
                      { id: 2, label: 'Balanced' },
                      { id: 5, label: 'High' }
                    ].map(r => (
                      <button
                        key={r.id}
                        onClick={() => setEntropy(r.id)}
                        className={`py-2 px-3 rounded-lg text-sm font-medium transition-all ${
                          entropy === r.id 
                            ? 'bg-neutral-700 text-white border border-neutral-500' 
                            : 'bg-neutral-900 text-neutral-500 border border-neutral-800 hover:bg-neutral-800'
                        }`}
                      >
                        {r.label}
                      </button>
                    ))}
                  </div>
                </div>

                {mode !== 'tv' && (
                  <div>
                    <div className="flex items-center gap-3 mb-3">
                      <div className="p-2 bg-neutral-800 rounded-lg">
                        <Keyboard className="w-4 h-4 text-white" />
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-white">Keyboard Layout</div>
                        <div className="text-xs text-neutral-500">Match the physical keyboard you're typing on.</div>
                      </div>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      {[
                        { id: 'qwerty', label: 'QWERTY' },
                        { id: 'colemak', label: 'Colemak' },
                        { id: 'dvorak', label: 'Dvorak' }
                      ].map(l => (
                        <button
                          key={l.id}
                          onClick={() => setLayout(l.id)}
                          className={`py-2 px-3 rounded-lg text-sm font-medium transition-all ${
                            layout === l.id 
                              ? 'bg-neutral-700 text-white border border-neutral-500' 
                              : 'bg-neutral-900 text-neutral-500 border border-neutral-800 hover:bg-neutral-800'
                          }`}
                        >
                          {l.label}
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {mode !== 'keyboard' && (
                  <div>
                    <div className="flex items-center gap-3 mb-3">
                      <div className="p-2 bg-neutral-800 rounded-lg">
                        <Crosshair className="w-4 h-4 text-white" />
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-white">TV Cursor Start Position</div>
                        <div className="text-xs text-neutral-500">Starts password near your TV's default focus ring.</div>
                      </div>
                    </div>
                    <div className="grid grid-cols-4 gap-2">
                      {[
                        { id: 'g', label: 'Center (G)' },
                        { id: 'q', label: 'Top Left (Q)' },
                        { id: 'none', label: 'Ignore' }
                      ].map(c => (
                        <button
                          key={c.id}
                          onClick={() => setTvCursor(c.id)}
                          className={`py-2 px-3 rounded-lg text-sm font-medium transition-all ${
                            tvCursor === c.id 
                              ? 'bg-neutral-700 text-white border border-neutral-500' 
                              : 'bg-neutral-900 text-neutral-500 border border-neutral-800 hover:bg-neutral-800'
                          }`}
                        >
                          {c.label}
                        </button>
                      ))}
                      <div className="relative flex">
                        <button
                          onClick={() => setTvCursor('other')}
                          className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium transition-all ${
                            tvCursor === 'other'
                              ? 'bg-neutral-700 text-white border border-neutral-500' 
                              : 'bg-neutral-900 text-neutral-500 border border-neutral-800 hover:bg-neutral-800'
                          }`}
                        >
                          Other
                        </button>
                        {tvCursor === 'other' && (
                          <input
                            type="text"
                            maxLength={1}
                            value={customTvCursor}
                            onChange={(e) => setCustomTvCursor(e.target.value.toLowerCase())}
                            className="absolute right-1 top-0 bottom-0 w-8 bg-transparent border-none text-center text-white focus:outline-none focus:ring-1 focus:ring-white rounded-r-lg uppercase font-mono"
                            placeholder="A"
                          />
                        )}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <hr className="my-8 border-neutral-800" />

              <div className="bg-neutral-900 rounded-xl p-4 flex flex-col md:flex-row items-center justify-between border border-neutral-800 gap-4 mb-4">
                <div className="flex items-center gap-3">
                  <Gamepad2 className="text-white w-8 h-8" />
                  <div>
                    <div className="text-xs text-neutral-400 uppercase tracking-wider font-semibold">
                      {mode === 'tv' ? 'D-Pad Efficiency' : mode === 'keyboard' ? 'Typing Efficiency' : 'Hybrid Efficiency'}
                    </div>
                    <div className="text-white font-medium text-lg">
                      {Math.round(stats.optimized)} {mode === 'tv' ? 'presses' : 'effort score'} <span className="text-neutral-500 text-sm font-normal">vs {Math.round(stats.standard)} standard</span>
                    </div>
                  </div>
                </div>
                <div className="px-4 py-2 bg-white/10 border border-white/20 rounded-lg text-white font-bold flex items-center gap-2 text-sm md:text-base">
                  <span className="text-xl">⚡</span> {stats.saved}% less {mode === 'tv' ? 'thumb effort' : 'finger travel'}
                </div>
              </div>
              
              <div className="bg-neutral-900/50 rounded-xl p-4 flex flex-col md:flex-row items-center justify-between border border-neutral-800 gap-4">
                <div className="flex items-center gap-3">
                  <Dna className="text-purple-400 w-8 h-8" />
                  <div>
                    <div className="text-xs text-neutral-400 uppercase tracking-wider font-semibold">
                      Equivalent Random Security
                    </div>
                    <div className="text-white font-medium text-lg">
                      {stats.equivalentLength} <span className="text-neutral-500 text-sm font-normal">random chars</span>
                    </div>
                  </div>
                </div>
                <div className="text-xs text-neutral-500 max-w-[200px] text-right">
                  Length needed for equal entropy if attacker knows this tool.
                </div>
              </div>

            </div>

            <div className="mt-8 flex gap-3 p-4 bg-neutral-900/50 rounded-xl border border-neutral-800/50 text-sm text-neutral-400">
              <Info className="w-6 h-6 text-neutral-500 flex-shrink-0" />
              <p>
                <strong>TV Mode</strong> minimizes Manhattan distance. <strong>Keyboard Mode</strong> prioritizes strong fingers on the home row, limits single-finger repetition, and heavily avoids contorted Shift-key stretches. <strong>Entropy controls</strong> let you widen the search pool to trade a bit of comfort for higher security against pattern-guessing.
              </p>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
