<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixelator - Nearest Neighbor Downscaler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cross-browser support for sharp pixel rendering */
        .pixelated {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }
        
        .smooth {
            image-rendering: auto;
        }
        
        /* Custom scrollbar for preview areas */
        .preview-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .preview-container::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .preview-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .preview-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* CSS checkerboard pattern for transparent images */
        .custom-checkerboard {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%), 
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Hide selection during pan */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <div class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8 text-center sm:text-left flex flex-col sm:flex-row items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Pixelator</h1>
                <p class="text-slate-500 mt-1">Nearest neighbor image downscaler</p>
            </div>
            
            <div id="interaction-hint" class="hidden mt-4 sm:mt-0 px-4 py-2 bg-indigo-50 border border-indigo-100 rounded-lg text-xs text-indigo-600 font-medium items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                Ctrl/Cmd + Scroll to zoom • Drag to pan
            </div>
        </header>

        <!-- Upload Section -->
        <div id="upload-section" class="w-full max-w-2xl mx-auto mt-12 transition-all duration-300">
            <label for="image-upload" id="drop-area" class="flex flex-col items-center justify-center w-full h-64 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-white hover:bg-slate-50 transition-colors shadow-sm relative px-4 text-center">
                <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-500">
                    <svg class="w-12 h-12 mb-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="mb-2 text-sm sm:text-base"><span class="font-semibold text-slate-700">Tap to upload</span> or drag and drop</p>
                    <p class="text-xs text-slate-400 mb-1">PNG, JPG, WEBP</p>
                    <p class="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded mt-2">iOS Tip: Select "Choose File" or "Browse" for Google Drive</p>
                </div>
                <input id="image-upload" type="file" class="hidden" accept=".jpg, .jpeg, .png, .webp, image/jpeg, image/png, image/webp" />
            </label>
        </div>

        <!-- Editor Section (Hidden initially) -->
        <div id="editor-section" class="hidden flex-col gap-6">
            
            <!-- Controls bar -->
            <div class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col xl:flex-row gap-6 items-center justify-between">
                
                <!-- Factor Slider -->
                <div class="w-full xl:w-1/3 flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label for="pixel-size" class="text-sm font-medium text-slate-700">Downscale Factor</label>
                        <div class="flex items-center bg-indigo-50 px-2 py-1 rounded focus-within:ring-2 focus-within:ring-indigo-300 transition-shadow">
                            <input type="number" id="pixel-size-number" min="1" max="64" step="0.1" value="1" class="w-12 bg-transparent text-sm font-bold text-indigo-600 outline-none text-right appearance-none">
                            <span class="text-sm font-bold text-indigo-600 ml-0.5">x</span>
                        </div>
                    </div>
                    <input type="range" id="pixel-size" min="1" max="64" value="1" step="0.1" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                </div>

                <!-- Tools & Export -->
                <div class="w-full xl:w-auto flex flex-wrap gap-4 justify-center items-center">
                    
                    <!-- Rendering Toggle -->
                    <label class="flex items-center gap-2 cursor-pointer group px-2 border-r border-slate-200 pr-4">
                        <span class="text-xs sm:text-sm text-slate-500 font-medium">Smooth Upscale</span>
                        <div class="relative w-10 sm:w-12 h-6 rounded-full transition-colors duration-200 ease-in-out shrink-0 bg-indigo-500" id="render-toggle-track">
                            <div id="render-toggle-thumb" class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform duration-200 ease-in-out translate-x-4 sm:translate-x-6"></div>
                        </div>
                        <span class="text-xs sm:text-sm font-medium text-indigo-600" id="render-toggle-label">Pixelated Upscale</span>
                        <input type="checkbox" id="render-toggle" class="hidden" checked>
                    </label>

                    <!-- Zoom Controls -->
                    <div class="flex items-center bg-slate-100 rounded-lg border border-slate-200">
                        <button type="button" id="btn-zoom-out" class="p-2 hover:bg-slate-200 text-slate-600 transition-colors rounded-l-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                        </button>
                        <div id="zoom-value" class="w-14 text-center text-xs font-mono text-slate-600 select-none">100%</div>
                        <button type="button" id="btn-zoom-in" class="p-2 hover:bg-slate-200 text-slate-600 transition-colors rounded-r-lg">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                        </button>
                    </div>

                    <!-- Download Group -->
                    <div class="flex items-center gap-2 bg-slate-100 p-1.5 rounded-lg border border-slate-200">
                        <div class="flex items-center gap-1.5 pl-2 pr-2 border-r border-slate-300" title="Scale the downscaled image back up using nearest-neighbor before saving.">
                            <label for="export-scale" class="text-xs text-slate-500 font-medium whitespace-nowrap">Export Upscale:</label>
                            <div class="flex items-center bg-white px-1.5 py-0.5 rounded shadow-sm focus-within:ring-1 focus-within:ring-indigo-300 transition-shadow">
                                <input type="number" id="export-scale" min="1" max="100" step="1" value="1" class="w-8 text-xs font-bold text-indigo-600 text-right outline-none bg-transparent appearance-none">
                                <span class="text-xs text-slate-400 font-bold ml-0.5">x</span>
                            </div>
                        </div>
                        <button type="button" id="btn-download" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md font-medium text-sm shadow-sm transition-colors flex items-center gap-2 whitespace-nowrap">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Save
                        </button>
                    </div>

                </div>
            </div>

            <!-- Single Preview Area -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col w-full">
                <div class="bg-slate-100 px-4 py-3 border-b border-slate-200 flex justify-between items-center z-10 relative shadow-sm">
                    <h2 class="text-sm font-semibold text-slate-700">Preview</h2>
                    <span id="pixel-dimensions" class="text-xs text-slate-500 text-indigo-600 font-medium"></span>
                </div>
                <div id="pixel-container" class="preview-container w-full h-[600px] overflow-auto custom-checkerboard relative cursor-grab no-select touch-none">
                    <div class="min-w-full min-h-full w-max h-max flex items-center justify-center p-4 pointer-events-none">
                        <canvas id="canvas-preview" class="shadow-md pixelated"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="text-center pb-8">
                <button type="button" id="btn-reset" class="text-slate-500 hover:text-slate-700 text-sm font-medium underline transition-colors">Start over with a new image</button>
            </div>

        </div>
    </div>

    <!-- Hidden canvas used for the actual downscaling process -->
    <canvas id="canvas-downscaled" class="hidden"></canvas>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const uploadSection = document.getElementById('upload-section');
            const editorSection = document.getElementById('editor-section');
            const hintSection = document.getElementById('interaction-hint');
            const fileInput = document.getElementById('image-upload');
            const dropArea = document.getElementById('drop-area');
            
            const canvasPreview = document.getElementById('canvas-preview');
            const canvasDownscaled = document.getElementById('canvas-downscaled');
            
            const ctxPreview = canvasPreview.getContext('2d', { willReadFrequently: true });
            const ctxDownscaled = canvasDownscaled.getContext('2d', { willReadFrequently: true });
            
            const pixelContainer = document.getElementById('pixel-container');
            
            const pixelSizeSlider = document.getElementById('pixel-size');
            const pixelSizeNumber = document.getElementById('pixel-size-number');
            const pixelDimensionsTxt = document.getElementById('pixel-dimensions');
            const exportScaleInput = document.getElementById('export-scale');
            
            const btnZoomIn = document.getElementById('btn-zoom-in');
            const btnZoomOut = document.getElementById('btn-zoom-out');
            const zoomValueTxt = document.getElementById('zoom-value');
            const btnDownload = document.getElementById('btn-download');
            const btnReset = document.getElementById('btn-reset');

            const renderToggle = document.getElementById('render-toggle');
            const renderToggleTrack = document.getElementById('render-toggle-track');
            const renderToggleThumb = document.getElementById('render-toggle-thumb');
            const renderToggleLabel = document.getElementById('render-toggle-label');

            // State
            let currentImage = null;
            let currentZoom = 1;
            let isPixelated = true;
            let originalFilename = 'pixelated_image';

            // -- Event Listeners for Upload --
            fileInput.addEventListener('change', (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    loadImage(e.target.files[0]);
                }
            });

            // Drag and drop events
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => {
                    dropArea.classList.add('border-indigo-500', 'bg-indigo-50');
                    dropArea.classList.remove('border-slate-300', 'bg-white');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropArea.addEventListener(eventName, () => {
                    dropArea.classList.remove('border-indigo-500', 'bg-indigo-50');
                    dropArea.classList.add('border-slate-300', 'bg-white');
                }, false);
            });

            dropArea.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                if (files && files.length > 0) {
                    loadImage(files[0]);
                }
            });

            // -- Core Logic --
            function loadImage(file) {
                if (!file.type.match('image.*')) {
                    alert('Please upload an image file (PNG, JPG, WEBP).');
                    return;
                }
                originalFilename = file.name.replace(/\.[^/.]+$/, "");
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        currentImage = img;
                        setupWorkspace();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function setupWorkspace() {
                uploadSection.classList.add('hidden');
                editorSection.classList.remove('hidden');
                editorSection.classList.add('flex');
                hintSection.classList.remove('hidden');
                hintSection.classList.add('flex');

                const containerHeight = 600; 
                // Calculate initial zoom to fit slightly within bounds
                if (currentImage.height > (containerHeight - 32) || currentImage.width > (pixelContainer.clientWidth - 32)) {
                    const scaleY = (containerHeight - 32) / currentImage.height;
                    const scaleX = (pixelContainer.clientWidth - 32) / currentImage.width;
                    currentZoom = Math.min(scaleX, scaleY, 1);
                } else {
                    currentZoom = 1;
                }

                applyZoom();
                processPixelation();
            }

            function processPixelation() {
                if (!currentImage) return;

                const factor = parseFloat(pixelSizeSlider.value);
                const downWidth = Math.max(1, Math.floor(currentImage.width / factor));
                const downHeight = Math.max(1, Math.floor(currentImage.height / factor));

                // 1. Draw to downscaled canvas (Always nearest-neighbor for the pixel reduction)
                canvasDownscaled.width = downWidth;
                canvasDownscaled.height = downHeight;
                ctxDownscaled.imageSmoothingEnabled = false;
                ctxDownscaled.drawImage(currentImage, 0, 0, downWidth, downHeight);

                // 2. Setup upscale canvas
                canvasPreview.width = currentImage.width;
                canvasPreview.height = currentImage.height;
                
                // Toggle native canvas smoothing on upscale
                ctxPreview.imageSmoothingEnabled = !isPixelated; 
                
                // Ensure CSS classes match the smoothing state to prevent browser-level zoom artifacts
                if (isPixelated) {
                    canvasPreview.classList.add('pixelated');
                    canvasPreview.classList.remove('smooth');
                } else {
                    canvasPreview.classList.remove('pixelated');
                    canvasPreview.classList.add('smooth');
                }

                // Upscale the small image back to full dimensions
                ctxPreview.drawImage(canvasDownscaled, 0, 0, downWidth, downHeight, 0, 0, currentImage.width, currentImage.height);

                pixelDimensionsTxt.textContent = `Target: ${downWidth} × ${downHeight}px (Upscaled to Original)`;
            }

            // -- Interactivity Controls --

            // 1. Rendering Toggle (Smooth vs Pixelated)
            renderToggle.addEventListener('change', (e) => {
                isPixelated = e.target.checked;
                
                // Update UI visually
                if (isPixelated) {
                    renderToggleTrack.classList.replace('bg-slate-400', 'bg-indigo-500');
                    renderToggleThumb.classList.remove('translate-x-0');
                    renderToggleThumb.classList.add('translate-x-4', 'sm:translate-x-6');
                    renderToggleLabel.classList.replace('text-slate-500', 'text-indigo-600');
                    renderToggleLabel.textContent = 'Pixelated Upscale';
                } else {
                    renderToggleTrack.classList.replace('bg-indigo-500', 'bg-slate-400');
                    renderToggleThumb.classList.remove('translate-x-4', 'sm:translate-x-6');
                    renderToggleThumb.classList.add('translate-x-0');
                    renderToggleLabel.classList.replace('text-indigo-600', 'text-slate-500');
                    renderToggleLabel.textContent = 'Smooth Upscale';
                }
                
                // Re-process the canvas to apply new smoothing rules
                processPixelation();
            });

            // 2. Sliders & Sync
            function syncFactor(e) {
                let val = parseFloat(e.target.value);
                if (isNaN(val)) return; // Allow temporary empty typing
                
                pixelSizeSlider.value = val;
                if (e.target !== pixelSizeNumber) {
                    pixelSizeNumber.value = val;
                }
                processPixelation();
            }

            pixelSizeSlider.addEventListener('input', syncFactor);
            pixelSizeNumber.addEventListener('input', syncFactor);
            
            // Clean up wild entries on blur
            pixelSizeNumber.addEventListener('blur', (e) => {
                let val = parseFloat(e.target.value);
                if (isNaN(val) || val < 1) val = 1;
                if (val > 64) val = 64;
                e.target.value = val;
                pixelSizeSlider.value = val;
                processPixelation();
            });

            // Clean up export scale on blur
            exportScaleInput.addEventListener('blur', (e) => {
                let val = parseInt(e.target.value, 10);
                if (isNaN(val) || val < 1) val = 1;
                e.target.value = val;
            });

            btnZoomIn.addEventListener('click', () => {
                currentZoom = Math.min(currentZoom * 1.5, 64);
                applyZoom();
            });

            btnZoomOut.addEventListener('click', () => {
                currentZoom = Math.max(currentZoom / 1.5, 0.125);
                applyZoom();
            });

            function applyZoom() {
                if (!currentImage) return;
                
                const scaledWidth = Math.max(1, Math.floor(currentImage.width * currentZoom));
                const scaledHeight = Math.max(1, Math.floor(currentImage.height * currentZoom));

                canvasPreview.style.width = `${scaledWidth}px`;
                canvasPreview.style.height = `${scaledHeight}px`;
                
                zoomValueTxt.textContent = `${Math.round(currentZoom * 100)}%`;
            }

            // 3. Panning Logic (Mouse & Touch)
            let isDragging = false;
            let dragStart = { x: 0, y: 0, scrollLeft: 0, scrollTop: 0 };
            
            const handlePointerDown = (e, container) => {
                if (e.touches && e.touches.length > 1) return; // ignore multi-touch for pan
                if (!e.touches && e.button !== 0) return; // only left click
                
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                dragStart = {
                    x: clientX,
                    y: clientY,
                    scrollLeft: container.scrollLeft,
                    scrollTop: container.scrollTop
                };
                
                container.classList.replace('cursor-grab', 'cursor-grabbing');
            };

            const handlePointerMove = (e, container) => {
                if (!isDragging) return;
                if (e.touches && e.touches.length > 1) return;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const dx = clientX - dragStart.x;
                const dy = clientY - dragStart.y;
                
                container.scrollLeft = dragStart.scrollLeft - dx;
                container.scrollTop = dragStart.scrollTop - dy;
            };

            const handlePointerUp = () => {
                isDragging = false;
                pixelContainer.classList.replace('cursor-grabbing', 'cursor-grab');
            };

            // 4. Zooming Logic (Wheel & Pinch)
            const handleWheel = (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        currentZoom = Math.min(currentZoom * 1.1, 64);
                    } else {
                        currentZoom = Math.max(currentZoom / 1.1, 0.125);
                    }
                    applyZoom();
                }
            };

            let lastPinchDist = null;
            const handlePinchTouchMove = (e) => {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    const dist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    
                    if (lastPinchDist !== null) {
                        const delta = dist - lastPinchDist;
                        const multiplier = 1 + (delta * 0.005);
                        currentZoom = Math.max(0.125, Math.min(currentZoom * multiplier, 64));
                        applyZoom();
                    }
                    lastPinchDist = dist;
                }
            };
            const resetPinch = () => { lastPinchDist = null; };

            // Attach interactions to preview pane
            pixelContainer.addEventListener('mousedown', (e) => handlePointerDown(e, pixelContainer));
            pixelContainer.addEventListener('mousemove', (e) => handlePointerMove(e, pixelContainer));
            pixelContainer.addEventListener('touchstart', (e) => handlePointerDown(e, pixelContainer));
            pixelContainer.addEventListener('touchmove', (e) => handlePointerMove(e, pixelContainer), { passive: false });
            
            pixelContainer.addEventListener('wheel', handleWheel, { passive: false });
            pixelContainer.addEventListener('touchmove', handlePinchTouchMove, { passive: false });
            pixelContainer.addEventListener('touchend', resetPinch);
            pixelContainer.addEventListener('touchcancel', resetPinch);

            // Global drop logic for panning
            window.addEventListener('mouseup', handlePointerUp);
            window.addEventListener('touchend', handlePointerUp);

            // -- Reset / Export --
            btnReset.addEventListener('click', () => {
                currentImage = null;
                editorSection.classList.add('hidden');
                editorSection.classList.remove('flex');
                uploadSection.classList.remove('hidden');
                hintSection.classList.add('hidden');
                hintSection.classList.remove('flex');
                fileInput.value = ''; 
                currentZoom = 1;
            });

            btnDownload.addEventListener('click', async () => {
                if (!currentImage) return;
                
                const downscaleFactor = pixelSizeSlider.value;
                const exportScale = Math.max(1, parseInt(exportScaleInput.value, 10) || 1);
                
                // Construct filename describing the entire operation
                let suffix = `downscaled_${downscaleFactor}x`;
                if (exportScale > 1) {
                    suffix += `_upscaled_${exportScale}x`;
                }
                const filename = `${originalFilename}_${suffix}.png`;
                
                // Determine which canvas to export
                let exportCanvas = canvasDownscaled;
                
                // If export scale is > 1, draw the downscaled image onto a larger canvas nearest-neighbor style
                if (exportScale > 1) {
                    exportCanvas = document.createElement('canvas');
                    exportCanvas.width = canvasDownscaled.width * exportScale;
                    exportCanvas.height = canvasDownscaled.height * exportScale;
                    const eCtx = exportCanvas.getContext('2d');
                    eCtx.imageSmoothingEnabled = false; // Nearest neighbor upscale for export
                    eCtx.drawImage(canvasDownscaled, 0, 0, exportCanvas.width, exportCanvas.height);
                }

                const getBlob = () => new Promise(resolve => exportCanvas.toBlob(resolve, 'image/png'));
                
                try {
                    const blob = await getBlob();
                    if (navigator.canShare) {
                        const file = new File([blob], filename, { type: 'image/png' });
                        if (navigator.canShare({ files: [file] })) {
                            await navigator.share({ files: [file], title: filename });
                            return; 
                        }
                    }
                    triggerFallbackDownload(blob, filename);
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        const blob = await getBlob();
                        triggerFallbackDownload(blob, filename);
                    }
                }
            });

            function triggerFallbackDownload(blob, filename) {
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = filename;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }
        });
    </script>
</body>
</html>
