<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cubemap Face Stitcher → 5×3 Atlas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #111; color: #e0e0e0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 60px;
    }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 24px; text-align: center; }

    /* ── Atlas diagram ── */
    .atlas-diagram {
      display: grid; grid-template-columns: repeat(5, 52px); grid-template-rows: repeat(3, 52px);
      gap: 2px; margin-bottom: 28px;
    }
    .atlas-cell {
      background: #222; border: 1px solid #333; border-radius: 3px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 9px; color: #666; line-height: 1.3; text-align: center; cursor: default;
    }
    .atlas-cell.active { border-color: #555; color: #aaa; }
    .atlas-cell.dup   { border-style: dashed; color: #555; }
    .atlas-cell span.face { font-size: 11px; font-weight: 600; color: #ccc; }
    .atlas-cell.top-row  { background: #1a1a26; }
    .atlas-cell.mid-row  { background: #1a261a; }
    .atlas-cell.bot-row  { background: #26181a; }

    /* ── Face upload grid ── */
    .faces-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%; max-width: 560px; margin-bottom: 28px;
    }
    .face-card {
      background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .face-card h3 { font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: #aaa; }
    .face-preview {
      width: 100%; aspect-ratio: 1; background: #0d0d0d; border-radius: 4px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; border: 1px dashed #333;
      transition: border-color 0.2s;
    }
    .face-preview:hover { border-color: #555; }
    .face-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .face-preview .placeholder { font-size: 11px; color: #444; text-align: center; line-height: 1.4; }
    .face-preview input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .face-preview.loaded .placeholder { display: none; }
    .face-preview.loaded img { display: block; }
    .rot-row { display: flex; gap: 4px; }
    .rot-btn {
      background: #2a2a2a; border: 1px solid #3a3a3a; color: #aaa;
      font-size: 13px; border-radius: 4px; padding: 4px 8px; cursor: pointer;
      transition: background 0.15s; flex: 1; text-align: center;
    }
    .rot-btn:hover { background: #383838; color: #fff; }
    .rot-btn.active { background: #3a4a3a; border-color: #4ade80; color: #4ade80; }
    .flip-row { display: flex; gap: 4px; }
    .flip-btn {
      background: #2a2a2a; border: 1px solid #3a3a3a; color: #888;
      font-size: 10px; border-radius: 4px; padding: 3px 6px; cursor: pointer;
      transition: background 0.15s; flex: 1; text-align: center;
    }
    .flip-btn:hover { background: #383838; color: #ccc; }
    .flip-btn.active { background: #3a2a3a; border-color: #c084fc; color: #c084fc; }

    /* ── Controls ── */
    .controls {
      width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 28px;
    }
    .ctrl-row { display: flex; align-items: center; gap: 10px; }
    label.ctrl-lbl { font-size: 12px; color: #888; text-transform: uppercase;
      letter-spacing: 0.4px; min-width: 80px; }
    select, input[type=number] {
      background: #1c1c1c; border: 1px solid #333; color: #e0e0e0;
      border-radius: 4px; padding: 6px 10px; font-size: 13px; outline: none;
    }
    input[type=number] { width: 80px; }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #4ade80; color: #000; }
    .btn-primary:hover { background: #22c55e; }
    .btn-primary:disabled { background: #2a3a2a; color: #555; cursor: not-allowed; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #444; }
    .btn-secondary:hover { background: #333; }

    /* ── Output canvas ── */
    #output-wrap {
      width: 100%; max-width: 800px; display: none; flex-direction: column;
      align-items: center; gap: 12px; margin-top: 8px;
    }
    #output-wrap h2 { font-size: 15px; font-weight: 600; }
    #output-canvas {
      width: 100%; border-radius: 6px; border: 1px solid #2a2a2a;
      image-rendering: pixelated;
    }
    .dl-row { display: flex; gap: 10px; }

    /* ── Status ── */
    #status { font-size: 12px; color: #888; min-height: 18px; text-align: center; }
  </style>
</head>
<body>

<h1>Cubemap Face Stitcher</h1>
<p class="subtitle">Upload 6 faces → get a 5×3 atlas ready for the LDI custom upload slot</p>

<!-- Atlas layout diagram -->
<div class="atlas-diagram" id="atlas-diagram"></div>

<!-- Face upload cards -->
<div class="faces-grid" id="faces-grid"></div>

<!-- Global controls -->
<div class="controls">
  <div class="ctrl-row">
    <label class="ctrl-lbl">Face size</label>
    <input type="number" id="face-size" value="1024" min="64" max="4096" step="64">
    <span style="font-size:12px;color:#555">px per face (output = 5× wide, 3× tall)</span>
  </div>
  <div class="ctrl-row">
    <label class="ctrl-lbl">Format</label>
    <select id="fmt-select">
      <option value="image/webp">WEBP</option>
      <option value="image/jpeg">JPEG</option>
      <option value="image/png">PNG (lossless)</option>
    </select>
    <label class="ctrl-lbl" style="min-width:unset">Quality</label>
    <input type="number" id="quality" value="92" min="1" max="100" step="1">
    <span style="font-size:12px;color:#555">%</span>
  </div>
</div>

<div class="action-row">
  <button class="btn btn-primary" id="stitch-btn" disabled>Stitch Atlas</button>
  <button class="btn btn-secondary" id="clear-btn">Clear All</button>
</div>

<p id="status"></p>

<!-- Output -->
<div id="output-wrap">
  <h2>Output Atlas (5×3)</h2>
  <canvas id="output-canvas"></canvas>
  <div class="dl-row">
    <button class="btn btn-primary" id="dl-btn">⬇ Download</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// Face definitions
// The 5×3 atlas layout (col 0–4, row 0–2):
//
//  Row 0 (top caps):   [Left↺90  Front      Right↻90  Back↻180  Left↺90 dup]
//  Row 1 (equator):    [Left      Front      Right     Back      Left dup   ]
//  Row 2 (bot caps):   [Left↻90  Front      Right↺90  Back↻180  Left↻90 dup]
//
// This ensures every face edge is contiguous with its neighbour:
//   • Top face blends: front/left/back/right all share the top edge → rotated to align
//   • Bottom face blends similarly
//   • Left col 4 duplicates col 0 so the seam wraps
//
// The viewer's sampleAtlas() for faces 2 (top) and 3 (bottom) blends
// four surrounding faces using diagonal weights, so each must be oriented
// so its "up" edge lines up with the centre of the top/bottom cap.
// ─────────────────────────────────────────────

const FACES = ['left','front','right','back','top','bottom'];
const FACE_LABELS = { left:'Left (−X)', front:'Front (+Z)', right:'Right (+X)', back:'Back (−Z)', top:'Top (+Y)', bottom:'Bottom (−Y)' };

// Atlas cell descriptor: { face, rot° CW, flipH, flipV, label }
// rot is clockwise degrees applied when drawing into the atlas cell
const LAYOUT = [
  // Row 0 – top-cap blending strip
  { face:'left',   rot: 90, fh:0, fv:0, note:'L ↺90'  },
  { face:'front',  rot:  0, fh:0, fv:0, note:'Front'  },
  { face:'right',  rot:-90, fh:0, fv:0, note:'R ↻90'  },
  { face:'back',   rot:180, fh:0, fv:0, note:'Bk ↻180'},
  { face:'left',   rot: 90, fh:0, fv:0, note:'L dup'  },  // col 4 wrap
  // Row 1 – equatorial strip
  { face:'left',   rot:  0, fh:0, fv:0, note:'Left'   },
  { face:'front',  rot:  0, fh:0, fv:0, note:'Front'  },
  { face:'right',  rot:  0, fh:0, fv:0, note:'Right'  },
  { face:'back',   rot:  0, fh:0, fv:0, note:'Back'   },
  { face:'left',   rot:  0, fh:0, fv:0, note:'L dup'  },  // col 4 wrap
  // Row 2 – bottom-cap blending strip
  { face:'left',   rot:-90, fh:0, fv:0, note:'L ↻90'  },
  { face:'front',  rot:  0, fh:0, fv:0, note:'Front'  },
  { face:'right',  rot: 90, fh:0, fv:0, note:'R ↺90'  },
  { face:'back',   rot:180, fh:0, fv:0, note:'Bk ↻180'},
  { face:'left',   rot:-90, fh:0, fv:0, note:'L dup'  },  // col 4 wrap
];

// User-loaded images + per-face transform overrides
const faceImages = {};   // face → HTMLImageElement
const faceRot    = {};   // face → additional rotation (0/90/180/270 CW)
const faceFlipH  = {};   // face → bool
const faceFlipV  = {};   // face → bool
FACES.forEach(f => { faceRot[f] = 0; faceFlipH[f] = false; faceFlipV[f] = false; });

// ── Build atlas diagram ──────────────────────
const diagram = document.getElementById('atlas-diagram');
const rowClass = ['top-row','mid-row','bot-row'];
LAYOUT.forEach((cell, i) => {
  const row = Math.floor(i / 5);
  const isDup = (i % 5 === 4);
  const el = document.createElement('div');
  el.className = `atlas-cell active ${rowClass[row]}${isDup ? ' dup' : ''}`;
  el.innerHTML = `<span class="face">${cell.note}</span><span>${cell.face.substring(0,3)}</span>`;
  el.title = `Row ${row}, Col ${i%5}: ${cell.face} rot ${cell.rot}°`;
  diagram.appendChild(el);
});

// ── Build face upload cards ──────────────────
const grid = document.getElementById('faces-grid');
FACES.forEach(face => {
  const card = document.createElement('div');
  card.className = 'face-card';
  card.innerHTML = `
    <h3>${FACE_LABELS[face]}</h3>
    <div class="face-preview" id="prev-${face}">
      <input type="file" accept="image/*" id="file-${face}">
      <img id="img-${face}" alt="${face}">
      <div class="placeholder">Click to<br>upload</div>
    </div>
    <div class="rot-row">
      <button class="rot-btn" data-face="${face}" data-rot="0" title="No rotation">0°</button>
      <button class="rot-btn" data-face="${face}" data-rot="90" title="Rotate 90° CW">90°</button>
      <button class="rot-btn" data-face="${face}" data-rot="180" title="Rotate 180°">180°</button>
      <button class="rot-btn" data-face="${face}" data-rot="270" title="Rotate 270° CW">270°</button>
    </div>
    <div class="flip-row">
      <button class="flip-btn" data-face="${face}" data-flip="h" title="Flip horizontal">⟺ H</button>
      <button class="flip-btn" data-face="${face}" data-flip="v" title="Flip vertical">⇅ V</button>
    </div>
  `;
  grid.appendChild(card);

  // Set default active rotation button
  card.querySelector('[data-rot="0"]').classList.add('active');

  // File input handler
  document.getElementById(`file-${face}`).addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById(`img-${face}`);
    img.onload = () => {
      faceImages[face] = img;
      document.getElementById(`prev-${face}`).classList.add('loaded');
      updateStitchBtn();
    };
    img.src = url;
    e.target.value = '';
  });
});

// Rotation button handlers
document.querySelectorAll('.rot-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const face = btn.dataset.face;
    const rot = parseInt(btn.dataset.rot);
    faceRot[face] = rot;
    document.querySelectorAll(`.rot-btn[data-face="${face}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// Flip button handlers
document.querySelectorAll('.flip-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const face = btn.dataset.face;
    const flip = btn.dataset.flip;
    if (flip === 'h') {
      faceFlipH[face] = !faceFlipH[face];
    } else {
      faceFlipV[face] = !faceFlipV[face];
    }
    btn.classList.toggle('active');
  });
});

// Clear all
document.getElementById('clear-btn').addEventListener('click', () => {
  FACES.forEach(face => {
    delete faceImages[face];
    faceRot[face] = 0; faceFlipH[face] = false; faceFlipV[face] = false;
    const img = document.getElementById(`img-${face}`);
    if (img.src) { URL.revokeObjectURL(img.src); img.src = ''; }
    document.getElementById(`prev-${face}`).classList.remove('loaded');
    document.querySelectorAll(`.rot-btn[data-face="${face}"]`).forEach(b => b.classList.remove('active'));
    document.querySelector(`.rot-btn[data-face="${face}"][data-rot="0"]`).classList.add('active');
    document.querySelectorAll(`.flip-btn[data-face="${face}"]`).forEach(b => b.classList.remove('active'));
  });
  document.getElementById('output-wrap').style.display = 'none';
  updateStitchBtn();
  setStatus('');
});

function updateStitchBtn() {
  const loaded = FACES.filter(f => faceImages[f]).length;
  document.getElementById('stitch-btn').disabled = loaded < 6;
  setStatus(loaded < 6 ? `${loaded}/6 faces loaded` : 'Ready to stitch!');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ── Stitch ──────────────────────────────────
document.getElementById('stitch-btn').addEventListener('click', stitch);

function drawFaceIntoCell(ctx, face, cellX, cellY, cellSize, baseRot) {
  const img = faceImages[face];
  if (!img) return;

  const totalRot = ((baseRot + faceRot[face]) % 360 + 360) % 360;
  const flipH = faceFlipH[face];
  const flipV = faceFlipV[face];

  ctx.save();
  // Translate to cell centre
  ctx.translate(cellX + cellSize / 2, cellY + cellSize / 2);
  // Apply rotation
  ctx.rotate(totalRot * Math.PI / 180);
  // Apply flips
  ctx.scale(flipH ? -1 : 1, flipV ? -1 : 1);
  // Draw image centred
  ctx.drawImage(img, -cellSize / 2, -cellSize / 2, cellSize, cellSize);
  ctx.restore();
}

function stitch() {
  const faceSize = Math.max(64, Math.min(4096, parseInt(document.getElementById('face-size').value) || 1024));
  const canvas = document.getElementById('output-canvas');
  canvas.width  = faceSize * 5;
  canvas.height = faceSize * 3;
  const ctx = canvas.getContext('2d');

  setStatus('Stitching…');

  LAYOUT.forEach((cell, idx) => {
    const col = idx % 5;
    const row = Math.floor(idx / 5);
    drawFaceIntoCell(ctx, cell.face, col * faceSize, row * faceSize, faceSize, cell.rot);
  });

  const wrap = document.getElementById('output-wrap');
  wrap.style.display = 'flex';
  setStatus('Done! ' + canvas.width + '×' + canvas.height + ' px');
}

// ── Download ─────────────────────────────────
document.getElementById('dl-btn').addEventListener('click', () => {
  const canvas = document.getElementById('output-canvas');
  if (!canvas.width) return;
  const fmt = document.getElementById('fmt-select').value;
  const quality = Math.max(0.01, Math.min(1, parseInt(document.getElementById('quality').value) / 100));
  const ext = fmt === 'image/png' ? 'png' : fmt === 'image/webp' ? 'webp' : 'jpg';
  setStatus('Encoding…');
  canvas.toBlob(blob => {
    if (!blob) { setStatus('Encoding failed (try PNG or reduce face size)'); return; }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `cubemap_atlas.${ext}`;
    a.click();
    URL.revokeObjectURL(a.href);
    setStatus(`Downloaded cubemap_atlas.${ext} (${(blob.size/1024).toFixed(0)} KB)`);
  }, fmt, quality);
});

// Format select: hide quality for PNG
document.getElementById('fmt-select').addEventListener('change', e => {
  document.getElementById('quality').disabled = e.target.value === 'image/png';
});

updateStitchBtn();
</script>
</body>
</html>
